ext {
    minSdkVersion = 22
    compileSdkVersion = 35
    targetSdkVersion = 35
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.9.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
    // CapacitorFirebaseAuthentication's Android module keeps play-services-auth
    // as compileOnly unless this is true, which leaves Google sign-in code
    // referencing classes that are absent from the APK at runtime (see
    // node_modules/@capacitor-firebase/authentication/android/build.gradle).
    // Mirrors the CapacitorFirebaseAuthentication/Google CocoaPods subspec
    // used on iOS (ios/App/Podfile).
    rgcfaIncludeGoogle = true
}