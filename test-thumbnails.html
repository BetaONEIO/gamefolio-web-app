<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Thumbnail Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #000; color: #fff; }
        .game { display: inline-block; margin: 10px; text-align: center; }
        .game img { width: 100px; height: 133px; object-fit: cover; border-radius: 8px; }
        .game-name { margin-top: 5px; font-size: 12px; max-width: 100px; }
        .error { color: red; margin-top: 5px; }
        .loading { color: yellow; }
    </style>
</head>
<body>
    <h1>Twitch Game Thumbnail Test</h1>
    <div id="games-container">
        <div class="loading">Loading games...</div>
    </div>

    <script>
        async function loadGames() {
            try {
                const response = await fetch('/api/twitch/games/top?limit=12');
                const games = await response.json();
                
                const container = document.getElementById('games-container');
                container.innerHTML = '';
                
                games.forEach(game => {
                    const gameDiv = document.createElement('div');
                    gameDiv.className = 'game';
                    
                    const img = document.createElement('img');
                    img.src = game.box_art_url;
                    img.alt = game.name;
                    img.onload = () => {
                        console.log(`✓ Loaded: ${game.name}`);
                    };
                    img.onerror = () => {
                        console.error(`✗ Failed: ${game.name} - URL: ${game.box_art_url}`);
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error';
                        errorDiv.textContent = 'Failed to load';
                        gameDiv.appendChild(errorDiv);
                    };
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'game-name';
                    nameDiv.textContent = game.name;
                    
                    gameDiv.appendChild(img);
                    gameDiv.appendChild(nameDiv);
                    container.appendChild(gameDiv);
                });
                
            } catch (error) {
                console.error('Failed to load games:', error);
                document.getElementById('games-container').innerHTML = 
                    '<div class="error">Failed to load games from API</div>';
            }
        }
        
        loadGames();
    </script>
</body>
</html>
